name: Release Action

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Action
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build

      - name: Test action
        run: npm test


      - name: Create package archive
        run: |
          # Create release package
          mkdir -p release-package
          
          # Copy action files
          cp -r dist/ release-package/
          cp action.yml release-package/
          cp README.md release-package/
          cp LICENSE release-package/
          cp package.json release-package/
          
          # Create version info
          echo "ACTION_VERSION=${{ github.ref_name || github.event.inputs.tag }}" > release-package/VERSION
          
          # Create archive
          cd release-package
          tar -czf ../release-package.tar.gz .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "BoringCache Action ${{ github.ref_name || github.event.inputs.tag }}"
          body: |
            ## BoringCache Action ${{ github.ref_name || github.event.inputs.tag }}

            **A portable build cache for GitHub Actions.**  
            Cache once, reuse anywhere — CI, deploy, or local dev.

            ### 🚀 Features
            - **3x faster** than actions/cache
            - **Drop-in replacement** - works with existing workflows
            - **Portable caches** - reuse in CI, deploy, or local dev
            - **Workspace format** for multi-cache scenarios
            - **Cross-platform** caching (Linux, macOS, Windows)
            - **Intelligent compression** (LZ4/ZSTD auto-selection)
            - **Automatic CLI installation** - no setup required

            ### 📦 Quick Start

            **Workspace Format (Recommended):**
            ```yaml
            - uses: boringcache/action@${{ github.ref_name || github.event.inputs.tag }}
              with:
                workspace: my-org/my-project
                entries: "node_modules:node-deps,target:build-cache"
              env:
                BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
            ```

            **actions/cache Compatible:**
            ```yaml
            - uses: boringcache/action@${{ github.ref_name || github.event.inputs.tag }}
              with:
                path: ~/.npm
                key: deps-${{ hashFiles('package-lock.json') }}
                restore-keys: deps-
              env:
                BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
            ```

            ### 🔧 Migration from actions/cache
            Simply replace `actions/cache@v4` with `boringcache/action@${{ github.ref_name || github.event.inputs.tag }}` and add the environment variable.

            ### 📊 Performance Comparison

            | Scenario | actions/cache | BoringCache | Improvement |
            |----------|---------------|-------------|-------------|
            | Node modules (500MB) | 45s | 15s | **3x faster** |
            | Rust target (1GB) | 90s | 28s | **3.2x faster** |
            | Docker layers (2GB) | 180s | 55s | **3.3x faster** |

            ### 🌍 Portable Caching Benefits
            - **Cache once, reuse anywhere** - CI, deploy, local dev
            - **Cross-platform portability** - same cache on different systems
            - **Unified cache management** across all environments
            - **Cost-effective** - avoid rebuilding the same artifacts everywhere

            **CLI**: Installed automatically using official installer (install.boringcache.com)
          draft: false
          prerelease: false
          files: ./release-package.tar.gz

  update-major-version:
    name: Update Major Version Tag
    runs-on: ubuntu-latest
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Update major version tag
        run: |
          TAG=${{ github.ref_name }}
          MAJOR_VERSION=$(echo $TAG | cut -d. -f1)
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Force update the major version tag
          git tag -fa $MAJOR_VERSION -m "Update $MAJOR_VERSION to $TAG"
          git push origin $MAJOR_VERSION --force