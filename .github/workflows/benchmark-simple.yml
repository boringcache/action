              "next": "^14.0.0",
              "webpack": "^5.88.0",
              "typescript": "^5.2.0",
              "@types/node": "^20.5.0",
              "@types/react": "^18.2.0",
              "eslint": "^8.47.0",
              "prettier": "^3.0.0",
              "jest": "^29.6.0",
              "babel-core": "^6.26.3",
              "babel-loader": "^9.1.3",
              "css-loader": "^6.8.1",
              "style-loader": "^3.3.3",
              "sass": "^1.66.0",
              "node-sass": "^9.0.0",
              "tailwindcss": "^3.3.0",
              "autoprefixer": "^10.4.15",
              "postcss": "^8.4.28",
              "prisma": "^5.2.0",
              "@prisma/client": "^5.2.0",
